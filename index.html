<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Günün Kutlu Olsun Aşkım</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #05070f;
        }

        /* DİNAMİK ARKA PLANLAR */
        .theme-landscape-moon {
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.85)), url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1200&auto=format&fit=crop');
        }
        .theme-blue-bordeaux {
            background: linear-gradient(135deg, #060913, #1e3a8a, #4c0519);
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -2;
            background: transparent url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=') repeat;
            animation: stars 50s linear infinite;
        }
        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .neon-glow {
            text-shadow: 0 0 15px rgba(244, 63, 94, 0.6);
        }
        .card-blur {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .title-font {
            font-family: 'Great Vibes', cursive;
        }

        .floating-heart {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            animation: floatEverywhere linear forwards;
        }
        .heart-svg {
            fill: none;
            stroke-width: 2.5px;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px currentColor);
        }

        @keyframes floatEverywhere {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            100% { transform: translate(var(--x-move), var(--y-move)) scale(1.2) rotate(360deg); opacity: 0; }
        }

        .spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .pulse-heart {
            animation: heartPulse 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.7));
        }
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.7)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(244, 63, 94, 0.9)); }
        }

        .touch-trail {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            filter: blur(0.5px) drop-shadow(0 0 8px currentColor);
            animation: trailFadeOut 1s forwards cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        @keyframes trailFadeOut {
            0% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0) translateY(-40px) translateX(var(--x-random)) rotate(180deg); }
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            perspective: 1000px;
            transition: all 0.5s ease;
        }
        .envelope-flap {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 140px solid rgba(255, 255, 255, 0.15);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
        }
        @media (max-width: 480px) {
            .envelope-flap {
                border-left-width: calc((100vw - 48px) / 2);
                border-right-width: calc((100vw - 48px) / 2);
            }
        }
        .letter-content {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px 20px;
            opacity: 0;
            transform: translateY(0) scale(0.9);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-wrapper.open .letter-content {
            opacity: 1;
            transform: translateY(-130px) scale(1.05);
            z-index: 5;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .envelope-wrapper.open {
            margin-top: 120px;
            margin-bottom: 120px;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            border: 5px solid white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }
        .lightbox.open img {
            transform: scale(1);
        }

        #settings-panel {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen text-white">

    <div class="stars"></div>

    <div id="password-screen" class="fixed inset-0 bg-[#05070f] z-[99999] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-8 tracking-wide uppercase neon-glow text-white/90">
                Şifre Giriniz Biliyorsan
            </h2>
            <input type="text" id="passwordInput" placeholder="......" 
                   class="w-full bg-transparent border-b-2 border-white/20 px-2 py-3 mb-6 text-center focus:outline-none focus:border-pink-500 transition-all text-2xl text-white">
            
            <button onclick="checkPassword()" 
                    class="w-full bg-white/5 border border-white/20 py-3.5 rounded-xl font-medium tracking-wide hover:bg-white/10 active:scale-95 transition-all text-lg">
                Giriş
            </button>
            
            <p id="errorMsg" class="mt-5 text-red-500 text-sm font-semibold tracking-wide hidden">
                Hata:Bilmiyorsan denemesene Awk
            </p>
        </div>
    </div>


    <div id="main-content" class="hidden min-h-screen theme-landscape-moon">

        <div class="fixed top-6 right-6 z-[110]">
            <button onclick="toggleSettings()" class="w-12 h-12 bg-white/5 backdrop-blur-lg border border-white/10 rounded-full flex items-center justify-center shadow-lg hover:bg-white/10 transition-all">
                <i class="fas fa-sliders text-xl text-white"></i>
            </button>

            <div id="settings-panel" class="absolute right-0 mt-3 w-56 bg-slate-950/90 backdrop-blur-xl border border-white/10 rounded-2xl p-4 shadow-2xl opacity-0 pointer-events-none scale-95 origin-top-right">
                <h3 class="text-xs font-semibold tracking-wider uppercase opacity-60 mb-3 text-center">Tema Seçenekleri</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="changeTheme('theme-landscape-moon')" class="py-2.5 rounded-xl border border-white/10 text-xs bg-white/5 hover:bg-pink-500/20 transition-all">🌙 Ay Işığı</button>
                    <button onclick="changeTheme('theme-blue-bordeaux')" class="py-2.5 rounded-xl border border-white/10 text-xs bg-white/5 hover:bg-blue-500/20 transition-all">🍇 Mavi & Bordo</button>
                </div>
            </div>
        </div>

        <div id="hearts" class="fixed inset-0 pointer-events-none z-50"></div>

        <div class="fixed bottom-6 right-6 z-[100]">
            <button onclick="toggleMusic()" id="musicBtn" class="w-16 h-16 card-blur rounded-full flex items-center justify-center transition-all active:scale-90">
                <i id="musicIcon" class="fas fa-music text-2xl text-blue-300"></i>
            </button>
            <audio id="bgMusic" loop>
                <source src="müzik1.mp3" type="audio/mpeg">
            </audio>
        </div>

        <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 relative">
            <div class="max-w-md mx-auto">
                <h1 class="title-font text-6xl leading-none mb-4 neon-glow">Doğum Günün<br>Kutlu Olsun</h1>
                <h2 class="title-font text-5xl text-pink-400 mb-8">Aşkım 🤍</h2>

                <div class="mx-auto w-72 h-72 rounded-3xl overflow-hidden border-4 border-white/20 shadow-2xl mb-8 pulse-heart">
                    <img src="ana.jpg" alt="Aşkım" class="w-full h-full object-cover">
                </div>

                <button onclick="document.getElementById('letter-section').scrollIntoView({behavior: 'smooth'})" 
                        class="px-10 py-4 card-blur hover:bg-white/10 rounded-full text-lg transition-all relative z-10">
                    Mektubunu Oku ↓
                </button>
            </div>
        </section>

        <section id="letter-section" class="py-32 px-6 flex flex-col items-center justify-center min-h-screen">
            <h2 class="title-font text-5xl text-center mb-16 text-pink-300">Sana Özel Mektubum</h2>
            
            <div class="envelope-wrapper" id="envelope" onclick="openEnvelope(event)">
                <div class="envelope-flap"></div>
                
                <div class="letter-content text-center flex flex-col justify-center items-center space-y-4">
                    <div id="typed-text" class="text-lg md:text-xl leading-relaxed font-semibold min-h-[150px] flex flex-col justify-center items-center space-y-3">
                    </div>
                </div>
                
                <div id="envelope-hint" class="absolute inset-0 flex items-center justify-center text-white/40 text-sm tracking-wider uppercase pointer-events-none z-10 transition-opacity duration-300">
                    Açmak için dokun Yavrum🤍
                </div>
            </div>
        </section>

        <section class="py-16 px-6 relative z-10">
            <h2 class="title-font text-5xl text-center mb-12 text-blue-300">Random Fotolar</h2>
            <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 gallery">
                <div class="rounded-3xl overflow-hidden border border-white/20 shadow-2xl cursor-pointer" onclick="openLightbox('Lamm.jpg')">
                    <img src="Lamm.jpg" class="w-full h-full object-cover">
                </div>
                <div class="rounded-3xl overflow-hidden border border-white/20 shadow-2xl cursor-pointer" onclick="openLightbox('Nnn.jpg')">
                    <img src="Nnn.jpg" class="w-full h-full object-cover">
                </div>
                <div class="rounded-3xl overflow-hidden border border-white/20 shadow-2xl cursor-pointer" onclick="openLightbox('Lan.jpg')">
                    <img src="Lan.jpg" class="w-full h-full object-cover">
                </div>
                <div class="rounded-3xl overflow-hidden border border-white/20 shadow-2xl cursor-pointer" onclick="openLightbox('Lam.jpg')">
                    <img src="Lam.jpg" class="w-full h-full object-cover">
                </div>
            </div>
        </section>

        <div id="lightbox" class="lightbox" onclick="closeLightbox()">
            <img id="lightbox-img" src="" alt="Büyük Görünüm">
        </div>

        <footer class="py-16 text-center text-3xl neon-glow relative z-10">
            Sen benim her şeyimsin 🤍<br>
            Doğum günün Kutlu Olsun Güzelim <br>
            👅👅👅👅👅👅👅👅👅👅👅👅👅👅👅<br>
                         22 Ekim 
        </footer>
    </div>

    <script>
        let appReady = false;

        // KESİN ÇÖZÜMLÜ ŞİFRE SİSTEMİ
        function checkPassword() {
            const input = document.getElementById('passwordInput').value.trim().toLowerCase();
            const passwordScreen = document.getElementById('password-screen');
            const mainContent = document.getElementById('main-content');

            if (input === '17 mart' || input === '1703' || input === '17.03' || input === '17mart') {
                // Şifre ekranını tamamen yok et, sayfayı aç
                passwordScreen.style.display = 'none';
                mainContent.classList.remove('hidden');
                appReady = true;

                // Konfeti fırlat
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#f43f5e', '#a855f7', '#3b82f6', '#ffffff'] });

                // Müziği yürütmeyi dene
                try {
                    const music = document.getElementById('bgMusic');
                    const btn = document.getElementById('musicBtn');
                    const icon = document.getElementById('musicIcon');
                    
                    music.play().then(() => {
                        icon.className = 'fas fa-compact-disc text-2xl text-white spin-slow';
                        btn.classList.add('bg-blue-500/30');
                    }).catch(err => {
                        console.log("Müzik etkileşim kısıtlamasında.");
                    });
                } catch(e) {
                    console.log("Müzik hatası.");
                }
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('passwordInput').value = '';
            }
        }

        // Enter tuşu desteği
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        const letterLines = ["<p class='text-xl text-pink-300 font-bold'>Yavrum,</p>", "<p class='text-lg md:text-xl font-semibold text-white'>Seni her zaman seviyorum. Seveceğim de.</p>", "<p class='text-lg md:text-xl font-semibold text-white'>Dünya güzeli Seni.</p>", "<p class='pt-4 italic text-sm opacity-70 text-pink-200'>Ömür boyu seninle,<br>Sevgilin 🤍</p>"];
        let isTypingStarted = false;

        function openEnvelope(e) {
            const env = document.getElementById('envelope');
            env.classList.toggle('open');
            
            if(env.classList.contains('open')) {
                document.getElementById('envelope-hint').style.opacity = '0';
                
                const rect = env.getBoundingClientRect();
                const centerX = (rect.left + rect.width / 2) / window.innerWidth;
                const centerY = (rect.top + rect.height / 2) / window.innerHeight;

                const defaults = { spread: 360, ticks: 100, gravity: 0.6, decay: 0.94, startVelocity: 20, colors: ['#f43f5e', '#ec4899', '#fffff0', '#fda4af'] };
                confetti({ ...defaults, particleCount: 50, scalar: 1.5, shapes: ['heart'], origin: { x: centerX, y: centerY } });
                confetti({ ...defaults, particleCount: 30, scalar: 1, origin: { x: centerX, y: centerY } });

                if (!isTypingStarted) { isTypingStarted = true; setTimeout(startTypewriter, 600); }
            } else { 
                setTimeout(() => { document.getElementById('envelope-hint').style.opacity = '1'; }, 400); 
            }
        }

        function startTypewriter() {
            const container = document.getElementById('typed-text');
            let lineIndex = 0;
            function typeNextLine() {
                if (lineIndex < letterLines.length) {
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = letterLines[lineIndex];
                    let element = tempDiv.firstChild;
                    container.appendChild(element);
                    element.style.opacity = '0';
                    element.style.transform = 'translateY(10px)';
                    element.style.transition = 'all 0.6s ease';
                    setTimeout(() => { element.style.opacity = '1'; element.style.transform = 'translateY(0)'; }, 50);
                    lineIndex++;
                    setTimeout(typeNextLine, 1200);
                }
            }
            typeNextLine();
        }

        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        const icon = document.getElementById('musicIcon');
        function toggleMusic() {
            if (music.paused) { music.play(); icon.className = 'fas fa-compact-disc text-2xl text-white spin-slow'; btn.classList.add('bg-blue-500/30'); }
            else { music.pause(); icon.className = 'fas fa-music text-2xl text-blue-300'; btn.classList.remove('bg-blue-500/30'); }
        }

        function createHeart() {
            if (!appReady) return; // Giriş yapılmadan kalp üretme
            const heartWrapper = document.createElement('div');
            heartWrapper.className = 'floating-heart';
            const size = Math.random() * 20 + 15; 
            const colors = ['#f43f5e', '#3b82f6', '#a855f7', '#ec4899', '#10b981', '#f59e0b'];
            heartWrapper.style.left = Math.random() * 100 + 'vw';
            heartWrapper.style.top = Math.random() * 100 + 'vh';
            heartWrapper.style.setProperty('--x-move', (Math.random() * 200 - 100) + 'px');
            heartWrapper.style.setProperty('--y-move', (Math.random() * -200 - 50) + 'px');
            heartWrapper.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="heart-svg" style="color: ${colors[Math.floor(Math.random() * colors.length)]}; stroke: ${colors[Math.floor(Math.random() * colors.length)]};"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            heartWrapper.style.animationDuration = (Math.random() * 4 + 4) + 's';
            document.getElementById('hearts').appendChild(heartWrapper);
            setTimeout(() => heartWrapper
